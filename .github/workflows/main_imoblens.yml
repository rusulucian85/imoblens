name: Build and deploy Next.js to Azure Web App - imoblens

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "22.x"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
          AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}

      - name: Copy static assets into standalone
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          printf '[BuildProperties]\nOperationId = "standalone"\n' > .next/standalone/oryx-manifest.toml
          # server.js does require('next') but NFT doesn't trace it because it's
          # in a generated template; copy the next package manually so it resolves.
          mkdir -p .next/standalone/node_modules/next
          cp -r node_modules/next/. .next/standalone/node_modules/next/

      - name: Package standalone (tar preserves symlinks)
        run: tar -czf standalone.tar.gz -C .next/standalone .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: standalone.tar.gz
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Extract standalone
        run: mkdir -p app && tar -xzf standalone.tar.gz -C app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_073F22E0152242149DEAE26C3213F4F8 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5221B960B29B4391AA473C330AE4AC6E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_3D0E9DFC0AF34048959AF2785B193838 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "imoblens"
          slot-name: "Production"
          package: app
          startup-command: "node server.js"
