name: Deploy to Azure on release

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  NODE_VERSION: "22.x"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
          AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}

      - name: Prepare deploy ZIP
        run: node scripts/prepare-deploy.js

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_073F22E0152242149DEAE26C3213F4F8 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5221B960B29B4391AA473C330AE4AC6E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_3D0E9DFC0AF34048959AF2785B193838 }}

      - name: Ensure startup command is set
        run: |
          az webapp config set \
            --resource-group imoblens \
            --name imoblens \
            --startup-file "bash startup.sh"

      - name: Deploy to Azure Web App
        run: |
          az webapp deploy \
            --resource-group imoblens \
            --name imoblens \
            --src-path imoblens-deploy.zip \
            --type zip \
            --async true
